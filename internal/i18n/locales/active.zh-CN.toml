# 模式
[PatternsShort]
other = "管理已学习的 patterns"

[PatternsLongDesc]
other = "管理已学习的代码模式。\n\n当前支持：\n  add     - 添加用户自定义候选模式，并在入库前完成策展\n  delete  - 删除指定 pattern，并标记关联 skills 待生成\n  compact - 调用当前 Agent 策展已有 patterns，减少重复规则\n  show    - 查看数据库中的 pattern 字段、时间和代码位置元数据\n  stats   - 查看模式质量和命中统计。\n\n整理前建议先运行 'skills-seed patterns show' 检查已有内容。"

[PatternsExample]
other = "  # 查看 patterns 数据库字段\n  skills-seed patterns show\n\n  # 查看单条 pattern 详情\n  skills-seed patterns show business-create-order\n\n  # 整理所有分类中的相似 patterns\n  skills-seed patterns compact"

[PatternsCompactShort]
other = "整理相似 patterns"

[PatternsCompactLongDesc]
