other = "分析指定的文件或目录。\n\n此命令将：\n  • 分析指定的文件\n  • 使用 配置的 AI Agent 检查代码\n  • 不依赖 Git 状态\n\n适用于：\n  • 在暂存前分析文件\n  • 检查其他分支的文件\n  • 快速分析无需 Git 上下文\n\n示例：\n  # 分析单个文件\n  skills-seed analyze main.go\n\n  # 分析目录\n  skills-seed analyze src/\n\n  # 分析多个文件\n  skills-seed analyze *.go"

