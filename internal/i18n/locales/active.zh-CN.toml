# 学习命令 - 子命令
[LearnCurrentShort]
other = "从当前代码学习"

[LearnCurrentLongDesc]
other = "分析当前代码库，提取编码模式、业务方法、最佳实践与项目画像。\n\n此命令将：\n  • 分析项目结构和代码\n  • 使用配置的 AI Agent 提取编码模式\n  • 保存学到的 patterns 到数据库\n  • 按策略保存项目画像到 .skills-seed/memory/project-profile.json\n  • 为 generate-skills 准备完整 project-overview 输入\n\n示例：\n  # 从当前代码学习\n  skills-seed learn current\n\n  # 指定语言\n  skills-seed learn current --language=go\n\n  # 只扫描指定目录，并自动判断是否刷新项目画像\n  skills-seed learn current -f internal/agent"

[LearnHistoryShort]
other = "从 Git 历史学习"

[LearnHistoryLongDesc]
other = "从 Git 提交历史中学习编码模式。\n\n此命令将：\n  • 分析 Git 提交历史\n  • 使用配置的 AI Agent 提取编码模式\n  • 提取业务方法和工具\n  • 保存学到的 patterns 到数据库\n\n学习完成后，可以使用 'skills-seed check' 来检查代码质量。\n\n示例：\n  # 学习最近 50 个提交\n  skills-seed learn history --limit=50\n\n  # 学习最近 30 天的提交\n  skills-seed learn history --since=30d"

