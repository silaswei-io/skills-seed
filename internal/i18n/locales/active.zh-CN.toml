[GenerateLongDesc]
other = "从学到的 patterns 和项目画像生成 AI Agent skills。\n\n此命令将：\n  • 从数据库读取学到的 patterns\n  • 读取 learn current/profile refresh 保存的项目画像\n  • 根据 agent.provider 选择对应 provider 的模板目录\n  • 生成 SKILL.md 与 references/ 文档\n  • 当模板提供 agents/openai.yaml 时自动生成对应元数据\n\n生成前请先运行 'skills-seed learn current' 或 'skills-seed profile refresh'。\n\n示例：\n  # 生成 skills 到当前 provider 的默认位置\n  skills-seed generate-skills\n\n  # 指定输出目录\n  skills-seed generate-skills --output <skills-output-dir>"

