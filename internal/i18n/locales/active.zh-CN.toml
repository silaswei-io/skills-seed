# 模式
[PatternsShort]
other = "管理已学习的 patterns"

[PatternsLongDesc]
other = "管理已学习的代码模式。\n\n当前支持：\n  add     - 通过 --context 添加用户自定义候选模式，并在入库前完成策展\n  update  - 通过 --context 修订指定 pattern\n  delete  - 删除指定 pattern\n  compact - 本地整理已有 patterns，减少重复规则；可显式 --ai 进行语义合并\n  show    - 查看数据库中的 pattern 字段、时间和代码位置元数据\n  stats   - 查看模式质量和命中统计。\n\n整理前建议先运行 'skills-seed patterns show' 检查已有内容。"

[PatternsExample]
other = "  # 查看 patterns 数据库字段\n  skills-seed patterns show\n\n  # 查看单条 pattern 详情\n  skills-seed patterns show business-create-order\n\n  # 整理所有分类中的相似 patterns\n  skills-seed patterns compact"

[PatternsCompactShort]
other = "整理相似 patterns"

[PatternsCompactLongDesc]
other = "默认使用本地确定性规则整理已学习 patterns，将高度相似的条目合并为更少、更清晰的 patterns，不调用 Agent。\n\n默认会写回数据库；使用 --dry-run 可只预览整理摘要。可用 --category 限定分类；需要 AI 语义合并时显式传入 --ai。"

[PatternsCompactExample]
other = "  # 本地整理所有相似 patterns 并写回数据库\n  skills-seed patterns compact\n\n  # 只整理 api 分类\n  skills-seed patterns compact --category api\n\n  # 预览整理结果，不写入数据库\n  skills-seed patterns compact --dry-run\n\n  # 使用 AI 进行语义合并并预览\n  skills-seed patterns compact --ai --dry-run"

[PatternsCompactFlagCategory]
other = "只整理指定分类，如 business、api、testing；留空表示所有分类"

[PatternsCompactFlagDryRun]
other = "只预览整理结果，不写入数据库"

[PatternsCompactFlagAI]
other = "使用 AI 进行语义合并；默认使用本地确定性合并"

