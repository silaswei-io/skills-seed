other = "重置当前仓库的 skills-seed 初始化状态。\n\n此命令会先把现有 .skills-seed 备份到 .skills-seed.backup/<timestamp>，再按指定模式重新创建配置和目录结构。适用于需要在 project 和 workspace 模式之间切换的场景。"

