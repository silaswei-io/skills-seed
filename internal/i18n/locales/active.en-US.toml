[PatternsUpdateShort]
other = "Update a pattern"

[PatternsUpdateLongDesc]
other = "Update a specific pattern using natural language through --context or --context-path. The command reads the current pattern, asks AI to regenerate structured content from the update request, and preserves the original pattern ID, creation time, and workspace ownership."

[PatternsUpdateExample]
other = "  # Update one pattern\n  skills-seed patterns update resp-extra-update-logging --context \"Require audit logging when response extra fields change\"\n\n  # Read the update request from files or directories; repeat --context-path for multiple sources\n  skills-seed patterns update resp-extra-update-logging --context-path docs/plan.md --context-path docs/specs"

