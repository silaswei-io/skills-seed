other = "Workflow name; generated by the Agent from context when omitted"

[WorkflowFlagContext]
other = "User-provided goals, constraints, background, paths, or rough notes; the Agent infers a standard workflow and merges same-name workflows by default"

[WorkflowFlagOverwrite]
other = "Completely replace the same-name workflow instead of merging with existing content"

[WorkflowFlagChild]
other = "In workspace mode, save the workflow to a child project, for example --child backend"

[WorkflowShowShort]
other = "Show existing workflow summaries or full details"

[WorkflowShowLongDesc]
