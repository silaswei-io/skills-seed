[LearnShort]
other = "Learn from Git history"

[LearnNotInitialized]
other = "skills-seed not initialized"

[LearnRunInitFirst]
other = "Please run 'skills-seed init' first"

[LearnLongDesc]
other = "Learn coding patterns from current code or Git commit history.\n\nThis command will:\n  • Analyze current code or recent Git commits\n  • Extract coding patterns using the configured AI agent\n  • Save learned patterns to the database\n  • Provide project convention input for check and generate-skills"

[LearnExample]
other = "  # Learn from current code\n  skills-seed learn current\n\n  # Learn from Git history\n  skills-seed learn history --limit=50\n\n  # Learn only from a focused directory\n  skills-seed learn current --focus internal/service --profile skip"

[LearnFromHistory]
other = "Learning from Git history"

[LearnAnalyzingCommits]
other = "Analyzing {{.Count}} commits..."

[CheckShort]
other = "Check staged files"

[CheckNotInitialized]
other = "skills-seed not initialized"

[CheckRunInitFirst]
other = "Please run 'skills-seed init' first"

[CheckLongDesc]
other = "Check whether staged files comply with learned coding standards.\n\nThis command will:\n  • Get Git staged files, or check all Git-tracked files when --all is set\n  • Analyze code using the configured AI agent\n  • Find issues based on learned patterns\n  • Provide fix suggestions\n\nUsually runs automatically via Git pre-commit hook."

[CheckFlagInteractive]
other = "Enable interactive fix confirmation (default true; hooks usually use --interactive=false)"

[CheckFlagAll]
other = "Check all files instead of only staged files"

[CheckExample]
other = "  # Check staged files and enter interactive handling when issues are found\n  skills-seed check\n\n  # Check all Git-tracked files\n  skills-seed check --all\n\n  # Disable interactivity for scripts or hooks\n  skills-seed check --interactive=false"

[GenerateShort]
other = "Generate AI Agent skills"

[GenerateNotInitialized]
other = "skills-seed not initialized"

[GenerateRunInitFirst]
other = "Please run 'skills-seed init' first"

[GenerateLongDesc]
other = "Generate AI Agent skills from learned patterns and the project profile.\n\nThis command will:\n  • Read learned patterns from database\n  • Read the project profile saved by learn current/profile refresh\n  • Select the target skills template from skills.target\n  • Use the CLI configured by agent.engine for summary merging and polishing\n  • Generate SKILL.md and references/ documentation\n  • Generate metadata such as agents/openai.yaml when the template provides it\n\nRun 'skills-seed learn current' or 'skills-seed profile refresh' before generating."

[GenerateExample]
other = "  # Generate to skills.paths for the current skills.target\n  skills-seed generate-skills\n\n  # Temporarily specify the output directory\n  skills-seed generate-skills --output .agents/skills/my-project\n\n  # Add guidance for this generate run\n  skills-seed generate-skills --context \"Preserve API compatibility constraints\""

[GenerateGenerating]
other = "Generating AI Agent skills..."

[GenerateSuccess]
other = "Skills generated successfully"

[GenerateOutputLocation]
other = "Generated to: {{.Path}}"

[HookShort]
other = "Manage Git hooks"

[HookLongDesc]
other = "Manage Git pre-commit hooks.\n\nThis command can:\n  • Install pre-commit hook\n  • Uninstall pre-commit hook\n  • Manually run hook check\n\nAfter installation, 'skills-seed check --interactive=false' runs automatically before each git commit."

[HookExample]
other = "  # Recommended: install the pre-commit hook\n  skills-seed hook install\n\n  # Compatible legacy form: install by flag\n  skills-seed hook --install\n\n  # Run the hook check manually\n  skills-seed hook run"

[HookFlagInstall]
other = "Install Git pre-commit hook (legacy-compatible; prefer hook install)"

[HookFlagUninstall]
other = "Uninstall Git pre-commit hook (legacy-compatible; prefer hook uninstall)"

[HookInstallShort]
other = "Install Git pre-commit hook"

[HookInstallLongDesc]
other = "Write .git/hooks/pre-commit in the current Git repository. The generated hook runs skills-seed check --interactive=false before each commit to check staged files against learned patterns."

[HookInstallExample]
other = "  # Install the hook in a repository initialized by skills-seed\n  skills-seed hook install"

[HookUninstallShort]
other = "Uninstall Git pre-commit hook"

[HookUninstallLongDesc]
other = "Remove .git/hooks/pre-commit from the current Git repository. This only removes the hook file managed by skills-seed; it does not remove .skills-seed data."

[HookUninstallExample]
other = "  # Uninstall the pre-commit hook\n  skills-seed hook uninstall"

[HookRunShort]
other = "Run the pre-commit hook manually"

[HookRunLongDesc]
other = "Run the same check logic used by the pre-commit hook against the current staged files. The command exits successfully when there are no staged Go files; it returns non-zero when checks fail."

[HookRunExample]
other = "  # Run one hook check manually\n  skills-seed hook run"

