# 模式
[PatternsShort]
other = "Manage learned patterns"

[PatternsLongDesc]
other = "Manage learned code patterns.\n\nCurrently supported:\n  add     - Add a user-defined candidate pattern through --context and curate it before storage\n  update  - Update a specific pattern through --context\n  delete  - Delete a pattern\n  compact - Compact existing patterns locally to reduce duplicate rules; use --ai explicitly for semantic merging\n  show    - Show database fields, timestamps, and code-location metadata for patterns\n  stats   - Show quality and hit statistics.\n\nBefore compacting, consider running 'skills-seed patterns show' to inspect existing content."

[PatternsExample]
other = "  # Show pattern database fields\n  skills-seed patterns show\n\n  # Show one pattern in detail\n  skills-seed patterns show business-create-order\n\n  # Compact similar patterns in all categories\n  skills-seed patterns compact"

[PatternsCompactShort]
other = "Compact similar patterns"

[PatternsCompactLongDesc]
other = "Use local deterministic rules by default to compact highly similar learned patterns into fewer, clearer entries without calling the Agent.\n\nBy default this writes back to the database. Use --dry-run to preview the summary only. Use --category to limit compaction to one category; pass --ai explicitly for AI semantic merging."

[PatternsCompactExample]
other = "  # Locally compact all similar patterns and write back to the database\n  skills-seed patterns compact\n\n  # Compact only the api category\n  skills-seed patterns compact --category api\n\n  # Preview compact results without writing\n  skills-seed patterns compact --dry-run\n\n  # Use AI for semantic merging and preview the result\n  skills-seed patterns compact --ai --dry-run"

[PatternsCompactFlagCategory]
other = "Only compact the specified category, such as business, api, or testing; empty means all categories"

[PatternsCompactFlagDryRun]
other = "Preview compact results without writing to the database"

[PatternsCompactFlagAI]
other = "Use AI for semantic merging; default uses local deterministic merging"

[PatternsCompactComplete]
other = "Patterns compacted: input {{.TotalInput}}, written {{.TotalWritten}}, dropped {{.TotalDropped}}, merged groups {{.MergeCount}}"

[PatternsAddShort]
other = "Add a user-defined pattern using natural language"

[PatternsAddLongDesc]
other = "Describe a coding convention or pattern in natural language through --context or --context-path, and AI will generate a structured Pattern combined with project context.\n\nAI auto-infers category, generates examples, and writes actionable rules. --context-path reads files or directories and is useful for longer notes, draft conventions, or one-shot reference material."

[PatternsAddExample]
other = "  # Pass a description directly\n  skills-seed patterns add --context \"All service methods must return domain error\"\n\n  # Specify category\n  skills-seed patterns add --context \"Use limit/offset for pagination\" --category api\n\n  # Read longer context from files or directories; repeat --context-path for multiple sources\n  skills-seed patterns add --context-path docs/plan.md --context-path docs/specs --category api"

[PatternsAddFlagCategory]
other = "Category: naming, error, structure, concurrency, testing, business, api, database, utils, middleware, config"

[PatternsAddFlagContext]
other = "Natural-language pattern description from the user"

