# ==================== 学习子命令 ====================
[LearnCurrentShort]
other = "Learn from current codebase"

[LearnCurrentLongDesc]
other = "Analyze current codebase and extract coding patterns, business methods, best practices, and the project profile.\n\nThis command will:\n  • Analyze project structure and code\n  • Use configured AI agent to extract coding patterns\n  • Save learned patterns to database\n  • Save the project profile to .skills-seed/memory/project-profile.json according to the selected strategy\n  • Prepare complete project-overview input for generate skills"

[LearnCurrentExample]
other = "  # Incrementally learn from the current codebase\n  skills-seed learn current\n\n  # Learn only a directory and skip profile refresh\n  skills-seed learn current --focus internal/service --profile skip\n\n  # Pass multiple focus paths\n  skills-seed learn current -f internal/agent -f internal/service\n\n  # Read guidance for this run from a file\n  skills-seed learn current --context-file .skills-seed/context.md"

[LearnHistoryShort]
other = "Learn from Git history"

[LearnHistoryLongDesc]
other = "Learn coding patterns from Git commit history.\n\nThis command will:\n  • Analyze Git commit history\n  • Use configured AI agent to extract coding patterns\n  • Extract business methods and tools\n  • Save learned patterns to database"

[LearnHistoryExample]
other = "  # Learn from the last 50 commits\n  skills-seed learn history --limit 50\n\n  # Learn from commits in the last 30 days\n  skills-seed learn history --since 30d\n\n  # Call the agent once per batch of 5 commits\n  skills-seed learn history --limit 40 --batch-size 5"

[LearnFlagLimit]
other = "Number of commits to analyze; already learned commits are skipped"

[LearnFlagSince]
other = "Time range (e.g., 7d, 30d, 6m, 1y)"

[LearnFlagBatchSize]
other = "Number of commits per batch; each batch is analyzed by one agent call and candidate patterns are curated before storage"

[LearnFlagLanguage]
other = "Primary programming language of the project; empty uses config or auto-detection"

[LearnFlagFocus]
other = "Directory or file to scan for learning; may be repeated; paths must stay under the project root"

[LearnFlagProfile]
other = "Project profile refresh strategy: auto refreshes when missing or when this run writes patterns, skip omits, refresh forces regeneration"

[LearnFlagContext]
other = "Additional guidance for this learn run, passed to the AI agent as extra constraints"

[LearnFlagContextFile]
other = "Read additional guidance for this learn run from a file; useful for longer constraints"

