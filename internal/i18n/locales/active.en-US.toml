other = "Agent engine to write during initialization, for example claude or codex"

[InitFlagSkills]
other = "Skills output type to write during initialization, for example claude or codex"

[InitFlagWorkspace]
other = "Initialize as workspace mode, equivalent to --mode workspace"

[AddShort]
other = "Add child projects to a workspace"

[AddLongDesc]
other = "Detect child projects under the workspace root, write selected projects to workspace.projects, and initialize their .skills-seed directories in project mode.\n\nUse . to add every currently detected child project. With arguments, each value may be a child project id or path. This command only works from a workspace-mode root repository."

[AddExample]
other = "  # Add and initialize every currently detected child project\n  skills-seed add .\n\n  # Add only specific child projects\n  skills-seed add backend frontend"

[AddRequireWorkspaceMode]
other = "add can only run in a workspace-mode root repository"

[AddProjectsMissing]
other = "No child projects were detected"

[AddProjectNotFound]
other = "Child project was not detected: {{.ProjectName}}"

[AddTargetRequired]
other = "Specify child projects to add, or use . to detect and add every child project"

[AddComplete]
other = "Child projects added"

[ResetShort]
other = "Back up and reset skills-seed initialization state"

[ResetLongDesc]
other = "Reset the skills-seed initialization state in the current repository.\n\nThis command first backs up the existing .skills-seed directory to .skills-seed.backup/<timestamp>, then recreates config and directories for the requested mode. Use it when switching between project and workspace modes."

[ResetExample]
other = "  # Reset to single-project mode\n  skills-seed reset --mode project\n\n  # Reset to workspace mode\n  skills-seed reset --mode workspace\n\n  # Workspace shortcut\n  skills-seed reset --workspace"

[ResetBackupFailed]
other = "Failed to back up .skills-seed"
