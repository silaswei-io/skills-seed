[LearnLongDesc]
other = "Learn coding patterns from current code or Git commit history.\n\nThis command will:\n  • Analyze current code or recent Git commits\n  • Extract coding patterns using the configured AI agent\n  • Save learned patterns to the database\n  • Provide project convention input for check and generate skills"

