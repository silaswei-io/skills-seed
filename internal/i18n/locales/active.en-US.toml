[WorkflowShort]
other = "Manage user workflows"

[WorkflowLongDesc]
other = "Ask the current Agent to infer and organize a standard workflow from user-provided goals, constraints, background, or paths, then save it as an independent resource. Same-name workflows are merged and deduplicated by default; use --overwrite to replace them completely. Use the show subcommand to inspect existing workflows without writing. Workflows are not profile.mode and do not affect the project/workspace mode lock."

[WorkflowExample]
other = "  skills-seed workflow --context \"Check environment variables and build artifacts before release, then run smoke tests after deployment\"\n  skills-seed workflow --name deploy --context \"Also check database migrations and rollback scripts before release\"\n  skills-seed workflow --name deploy --context \"Replace the release workflow with only this new process\" --overwrite"

