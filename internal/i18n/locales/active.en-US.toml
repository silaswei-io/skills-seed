# 模式
[PatternsShort]
other = "Manage learned patterns"

[PatternsLongDesc]
other = "Manage learned code patterns.\n\nCurrently supported:\n  add     - Add a user-defined candidate pattern and curate it before storage\n  delete  - Delete a pattern and mark related skills dirty\n  compact - Ask the current agent to curate existing patterns and reduce duplicate rules\n  show    - Show database fields, timestamps, and code-location metadata for patterns\n  stats   - Show quality and hit statistics.\n\nBefore compacting, consider running 'skills-seed patterns show' to inspect existing content."

[PatternsExample]
other = "  # Show pattern database fields\n  skills-seed patterns show\n\n  # Show one pattern in detail\n  skills-seed patterns show business-create-order\n\n  # Compact similar patterns in all categories\n  skills-seed patterns compact"

[PatternsCompactShort]
other = "Compact similar patterns"

[PatternsCompactLongDesc]
other = "Use the configured AI agent to curate learned patterns and compact semantically duplicate or highly similar entries into fewer, clearer patterns.\n\nBy default this writes back to the database. Use --dry-run to preview the curation summary only. Use --category to limit compaction to one category."

[PatternsCompactExample]
other = "  # Compact all similar patterns and write back to the database\n  skills-seed patterns compact\n\n  # Compact only the api category\n  skills-seed patterns compact --category api\n\n  # Preview compact results without writing\n  skills-seed patterns compact --dry-run"

[PatternsCompactFlagCategory]
other = "Only compact the specified category, such as business, api, or testing; empty means all categories"

[PatternsCompactFlagDryRun]
other = "Preview compact results without writing to the database"

[PatternsCompactComplete]
other = "Patterns compacted: input {{.TotalInput}}, written {{.TotalWritten}}, dropped {{.TotalDropped}}, merged groups {{.MergeCount}}"

[PatternsAddShort]
other = "Add a user-defined pattern using natural language"

[PatternsAddLongDesc]
