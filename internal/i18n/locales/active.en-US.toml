[RootShort]
other = "Growing project skills for AI agents"

[RootLong]
other = "Learn project conventions from a codebase and generate AI Agent skills."

[RootExample]
other = "  skills-seed init --mode project --agent codex --skills codex --locale en-US\n  skills-seed init --workspace --agent codex --skills codex --locale en-US\n  skills-seed add ."

[InitLongDesc]
other = "Initialize skills-seed in your project.\n\nThis command will:\n  • Create .skills-seed/ directory\n  • Generate default configuration (config.yaml)\n  • Initialize BoltDB database\n  • Prepare cross-agent compatible prompt and skills templates\n\nPlease run this command in the root directory of a Git repository."

[InitExample]
other = "  # Initialize a single-project repository with an execution Agent and skills output type\n  skills-seed init --mode project --agent codex --skills codex --locale en-US\n\n  # Initialize a workspace root and currently detected child projects\n  skills-seed init --workspace --agent codex --skills codex --locale en-US"

